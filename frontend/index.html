<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로직 분석 v2 - 네이버 쇼핑 키워드 분석 & 순위 추적</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans KR', -apple-system, sans-serif;
            background: #f8f9fb;
            color: #1e293b;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        #root { min-height: 100vh; }

        /* 유틸리티 */
        .container { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
        .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

        /* 헤더 */
        .top-bar {
            background: #fff;
            border-bottom: 1px solid #e8ecf1;
            position: sticky; top: 0; z-index: 50;
        }
        .top-bar-inner {
            display: flex; align-items: center; justify-content: space-between;
            height: 64px;
        }
        .logo { font-weight: 700; font-size: 17px; color: #0f172a; display: flex; align-items: center; gap: 8px; }
        .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; }
        .status-chip {
            font-size: 11px; font-weight: 600; padding: 3px 10px;
            border-radius: 999px; background: #ecfdf5; color: #059669;
        }
        .status-chip.offline { background: #fef2f2; color: #dc2626; }

        /* 검색바 */
        .search-section { background: #fff; border-bottom: 1px solid #e8ecf1; padding: 20px 0 24px; }
        .search-wrapper {
            display: flex; gap: 10px; align-items: center;
        }
        .search-input {
            flex: 1; height: 48px; padding: 0 18px;
            border: 2px solid #e2e8f0; border-radius: 10px;
            font-size: 15px; font-family: inherit;
            transition: border-color .2s, box-shadow .2s;
            outline: none; background: #fff;
        }
        .search-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
        .search-input::placeholder { color: #94a3b8; }
        .btn-search {
            height: 48px; padding: 0 28px;
            background: #3b82f6; color: #fff; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: background .2s;
            font-family: inherit; white-space: nowrap;
        }
        .btn-search:hover { background: #2563eb; }
        .btn-search:disabled { background: #94a3b8; cursor: not-allowed; }

        /* 섹션 공통 */
        .section { padding: 32px 0; }
        .section + .section { border-top: 1px solid #f1f5f9; }
        .section-title {
            font-size: 18px; font-weight: 700; color: #0f172a;
            margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
        }
        .section-title .icon {
            width: 28px; height: 28px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }
        .section-subtitle { font-size: 13px; color: #64748b; margin-bottom: 16px; }

        /* 카드 */
        .card {
            background: #fff; border-radius: 12px;
            border: 1px solid #e8ecf1;
            padding: 20px;
            transition: box-shadow .2s;
        }
        .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.05); }
        .card-grid { display: grid; gap: 16px; }
        .card-grid-4 { grid-template-columns: repeat(4, 1fr); }
        .card-grid-3 { grid-template-columns: repeat(3, 1fr); }
        .card-grid-2 { grid-template-columns: repeat(2, 1fr); }
        @media (max-width: 900px) {
            .card-grid-4, .card-grid-3 { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .card-grid-4, .card-grid-3, .card-grid-2 { grid-template-columns: 1fr; }
        }

        /* 스탯 카드 */
        .stat-label { font-size: 12px; font-weight: 500; color: #64748b; margin-bottom: 4px; }
        .stat-value { font-size: 28px; font-weight: 700; color: #0f172a; line-height: 1.2; }
        .stat-sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .stat-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; margin-bottom: 10px;
        }
        .stat-icon.blue { background: #eff6ff; }
        .stat-icon.green { background: #ecfdf5; }
        .stat-icon.amber { background: #fffbeb; }
        .stat-icon.purple { background: #faf5ff; }

        /* 배지 */
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 999px;
            font-size: 11px; font-weight: 600;
        }
        .badge-blue { background: #eff6ff; color: #2563eb; }
        .badge-green { background: #ecfdf5; color: #059669; }
        .badge-amber { background: #fffbeb; color: #d97706; }
        .badge-red { background: #fef2f2; color: #dc2626; }
        .badge-purple { background: #faf5ff; color: #7c3aed; }
        .badge-gray { background: #f1f5f9; color: #64748b; }
        .badge-gold { background: #fef9c3; color: #a16207; border: 1px solid #fde047; }

        /* 테이블 */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; font-weight: 600; color: #64748b; padding: 10px 12px; border-bottom: 2px solid #e8ecf1; font-size: 12px; text-transform: uppercase; letter-spacing: .02em; }
        td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; }
        tr:hover td { background: #f8fafc; }

        /* 버튼 */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            border: 1px solid transparent; font-family: inherit;
            transition: all .15s;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary { background: #fff; color: #334155; border-color: #e2e8f0; }
        .btn-secondary:hover { background: #f8fafc; border-color: #cbd5e1; }
        .btn-danger { background: #fff; color: #dc2626; border-color: #fecaca; }
        .btn-danger:hover { background: #fef2f2; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }

        /* 입력 폼 */
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 6px; }
        .form-input {
            width: 100%; height: 40px; padding: 0 12px;
            border: 1.5px solid #e2e8f0; border-radius: 8px;
            font-size: 14px; font-family: inherit; outline: none;
            transition: border-color .2s;
        }
        .form-input:focus { border-color: #3b82f6; }

        /* 차트 */
        .chart-box { position: relative; height: 260px; margin-top: 12px; }

        /* 프로그레스 바 */
        .progress-bar { height: 6px; border-radius: 999px; background: #e8ecf1; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 999px; transition: width .3s; }

        /* 로딩 */
        .spinner {
            width: 20px; height: 20px; border: 2.5px solid #e2e8f0;
            border-top-color: #3b82f6; border-radius: 50%;
            animation: spin .7s linear infinite; display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 빈 상태 */
        .empty-state {
            text-align: center; padding: 48px 20px; color: #94a3b8;
        }
        .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .5; }
        .empty-state p { font-size: 14px; }

        /* 순위 변동 */
        .rank-up { color: #dc2626; }
        .rank-down { color: #2563eb; }
        .rank-same { color: #94a3b8; }

        /* 섹션 앵커 네비 */
        .anchor-nav {
            display: flex; gap: 4px; flex-wrap: wrap;
        }
        .anchor-btn {
            padding: 6px 14px; border-radius: 999px;
            font-size: 12px; font-weight: 500; cursor: pointer;
            border: 1px solid #e8ecf1; background: #fff; color: #475569;
            transition: all .15s; font-family: inherit;
        }
        .anchor-btn:hover, .anchor-btn.active { background: #0f172a; color: #fff; border-color: #0f172a; }

        /* 토글 */
        .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-track {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #cbd5e1; border-radius: 24px; cursor: pointer; transition: .3s;
        }
        .toggle-track::before {
            content: ""; position: absolute; height: 18px; width: 18px;
            left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s;
        }
        .toggle input:checked + .toggle-track { background: #3b82f6; }
        .toggle input:checked + .toggle-track::before { transform: translateX(20px); }

        /* 스코어 링 */
        .score-ring {
            width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 700; margin: 0 auto 8px;
        }

        /* 탭 */
        .tab-bar { display: flex; gap: 0; border-bottom: 2px solid #e8ecf1; margin-bottom: 20px; }
        .tab-btn {
            padding: 10px 20px; font-size: 13px; font-weight: 600;
            color: #94a3b8; background: none; border: none; cursor: pointer;
            border-bottom: 2px solid transparent; margin-bottom: -2px;
            font-family: inherit; transition: all .15s;
        }
        .tab-btn:hover { color: #475569; }
        .tab-btn.active { color: #0f172a; border-bottom-color: #0f172a; }

        /* 알림/에러 메시지 */
        .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .alert-info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }

        /* 페이드인 애니메이션 */
        .fade-in { animation: fadeIn .4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* 푸터 */
        .footer { padding: 32px 0; text-align: center; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ==================== API 헬퍼 ====================
    const API_BASE = '/api';
    const api = {
        get: (url) => fetch(`${API_BASE}${url}`).then(r => r.json()),
        post: (url, body) => fetch(`${API_BASE}${url}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        }).then(r => r.json()),
        put: (url, body) => fetch(`${API_BASE}${url}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        }).then(r => r.json()),
        del: (url) => fetch(`${API_BASE}${url}`, { method: 'DELETE' }).then(r => r.json()),
    };

    // ==================== 유틸 ====================
    const fmt = (n) => n != null ? Number(n).toLocaleString() : '-';
    const compLabel = (c) => ({ '낮음': '낮음', 'LOW': '낮음', '보통': '보통', 'MEDIUM': '보통', '높음': '높음', 'HIGH': '높음', '': '-' }[c] || c || '-');
    const compClass = (c) => {
        const low = ['낮음', 'LOW', ''];
        const mid = ['보통', 'MEDIUM'];
        if (low.includes(c)) return 'badge-green';
        if (mid.includes(c)) return 'badge-amber';
        return 'badge-red';
    };

    // ==================== 공통 컴포넌트 ====================

    function LoadingSpinner({ text = '분석 중...' }) {
        return <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: 20, justifyContent: 'center', color: '#64748b', fontSize: 14 }}>
            <span className="spinner" />{text}
        </div>;
    }

    function EmptyState({ icon = '📊', text = '데이터가 없습니다' }) {
        return <div className="empty-state"><div className="empty-icon">{icon}</div><p>{text}</p></div>;
    }

    function StatCard({ icon, iconColor, label, value, sub }) {
        return (
            <div className="card">
                <div className={`stat-icon ${iconColor}`}>{icon}</div>
                <div className="stat-label">{label}</div>
                <div className="stat-value">{value}</div>
                {sub && <div className="stat-sub">{sub}</div>}
            </div>
        );
    }

    // ==================== 상단 헤더 ====================
    function TopBar({ health }) {
        return (
            <header className="top-bar">
                <div className="container top-bar-inner">
                    <div className="logo">
                        <span className="logo-dot" />
                        로직 분석
                        <span style={{ fontSize: 11, color: '#94a3b8', fontWeight: 400, marginLeft: 2 }}>v2.1</span>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                        <span className={`status-chip ${health ? '' : 'offline'}`}>
                            {health ? '● 정상 운영' : '○ 연결 확인 중'}
                        </span>
                    </div>
                </div>
            </header>
        );
    }

    // ==================== 통합 검색바 ====================
    function SearchBar({ onSearch, loading }) {
        const [keyword, setKeyword] = useState('');
        const handleSubmit = (e) => {
            e.preventDefault();
            if (keyword.trim()) onSearch(keyword.trim());
        };
        return (
            <div className="search-section">
                <div className="container">
                    <form onSubmit={handleSubmit} className="search-wrapper">
                        <input
                            className="search-input"
                            type="text"
                            placeholder="분석할 키워드를 입력하세요 (예: 스마트워치, 가습기, 텀블러)"
                            value={keyword}
                            onChange={e => setKeyword(e.target.value)}
                        />
                        <button className="btn-search" type="submit" disabled={loading || !keyword.trim()}>
                            {loading ? <><span className="spinner" style={{ width: 16, height: 16, borderWidth: 2 }} /> 분석 중</> : '키워드 분석'}
                        </button>
                    </form>
                </div>
            </div>
        );
    }

    // ==================== 대시보드 요약 ====================
    function DashboardSummary({ products, searchResult }) {
        const totalKeywords = products.reduce((sum, p) => sum + (p.keywords?.length || 0), 0);
        const allRanks = products.flatMap(p => (p.keywords || []).map(k => k.latest_rank)).filter(Boolean);
        const avgRank = allRanks.length > 0 ? Math.round(allRanks.reduce((a, b) => a + b, 0) / allRanks.length) : null;

        return (
            <div className="section fade-in">
                <div className="container">
                    <div className="card-grid card-grid-4">
                        <StatCard icon="📦" iconColor="blue" label="추적 상품" value={products.length} sub="등록된 상품 수" />
                        <StatCard icon="🔑" iconColor="green" label="추적 키워드" value={totalKeywords} sub="모니터링 중" />
                        <StatCard icon="📈" iconColor="amber" label="평균 순위" value={avgRank ? `${avgRank}위` : '-'} sub={avgRank ? (avgRank <= 20 ? '상위권' : avgRank <= 50 ? '중위권' : '개선 필요') : '데이터 없음'} />
                        <StatCard icon="🔍" iconColor="purple" label="연관 키워드" value={searchResult ? fmt(searchResult.total_found) : '-'} sub={searchResult ? `${searchResult.golden_keywords?.length || 0}개 황금키워드` : '키워드 검색 필요'} />
                    </div>
                </div>
            </div>
        );
    }

    // ==================== 순위 추적 섹션 ====================
    function RankTrackingSection({ products, refreshProducts }) {
        const [showAddForm, setShowAddForm] = useState(false);
        const [newUrl, setNewUrl] = useState('');
        const [newKeywords, setNewKeywords] = useState('');
        const [adding, setAdding] = useState(false);
        const [refreshing, setRefreshing] = useState({});
        const [expandedProduct, setExpandedProduct] = useState(null);
        const [historyData, setHistoryData] = useState({});

        const handleAdd = async () => {
            if (!newUrl || !newKeywords) return;
            setAdding(true);
            try {
                const kws = newKeywords.split(',').map(k => k.trim()).filter(Boolean);
                await api.post('/products/track', { product_url: newUrl, keywords: kws });
                setNewUrl(''); setNewKeywords(''); setShowAddForm(false);
                refreshProducts();
            } catch (e) { alert('등록 실패: ' + e.message); }
            setAdding(false);
        };

        const handleRefresh = async (productId) => {
            setRefreshing(prev => ({ ...prev, [productId]: true }));
            await api.post(`/rank/refresh/${productId}`);
            setTimeout(() => {
                refreshProducts();
                setRefreshing(prev => ({ ...prev, [productId]: false }));
            }, 5000);
        };

        const handleDelete = async (productId) => {
            if (!confirm('이 상품을 삭제하시겠습니까?')) return;
            await api.del(`/products/${productId}`);
            refreshProducts();
        };

        const loadHistory = async (keywordId) => {
            if (historyData[keywordId]) return;
            const res = await api.get(`/rank/history/${keywordId}?days=30`);
            if (res.success) setHistoryData(prev => ({ ...prev, [keywordId]: res.data }));
        };

        return (
            <div className="section" id="sec-rank">
                <div className="container">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                        <div className="section-title" style={{ marginBottom: 0 }}>
                            <span className="icon" style={{ background: '#eff6ff' }}>📊</span>
                            순위 추적
                        </div>
                        <button className="btn btn-primary btn-sm" onClick={() => setShowAddForm(!showAddForm)}>
                            {showAddForm ? '취소' : '+ 상품 등록'}
                        </button>
                    </div>

                    {showAddForm && (
                        <div className="card fade-in" style={{ marginBottom: 16 }}>
                            <div className="form-group">
                                <label className="form-label">상품 URL</label>
                                <input className="form-input" placeholder="https://smartstore.naver.com/..." value={newUrl} onChange={e => setNewUrl(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label className="form-label">추적 키워드 (쉼표로 구분)</label>
                                <input className="form-input" placeholder="스마트워치, 블루투스 이어폰" value={newKeywords} onChange={e => setNewKeywords(e.target.value)} />
                            </div>
                            <button className="btn btn-primary" onClick={handleAdd} disabled={adding}>
                                {adding ? '등록 중...' : '상품 등록'}
                            </button>
                        </div>
                    )}

                    {products.length === 0 ? (
                        <EmptyState icon="📦" text="추적 중인 상품이 없습니다. 상품을 등록해보세요." />
                    ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                            {products.map(p => (
                                <div className="card fade-in" key={p.id}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16 }}>
                                        <div style={{ display: 'flex', gap: 14, flex: 1, minWidth: 0 }}>
                                            {p.image_url && <img src={p.image_url} alt="" style={{ width: 56, height: 56, borderRadius: 8, objectFit: 'cover', flexShrink: 0 }} />}
                                            <div style={{ minWidth: 0 }}>
                                                <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                                    {p.product_name || '상품명 로딩 중'}
                                                </div>
                                                <div style={{ fontSize: 12, color: '#64748b' }}>{p.store_name || '-'}</div>
                                                {p.price > 0 && <div style={{ fontSize: 13, fontWeight: 600, color: '#0f172a', marginTop: 2 }}>{fmt(p.price)}원</div>}
                                            </div>
                                        </div>
                                        <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
                                            <button className="btn btn-secondary btn-sm" onClick={() => handleRefresh(p.id)} disabled={refreshing[p.id]}>
                                                {refreshing[p.id] ? '체크 중' : '↻ 순위체크'}
                                            </button>
                                            <button className="btn btn-danger btn-sm" onClick={() => handleDelete(p.id)}>삭제</button>
                                        </div>
                                    </div>

                                    {(p.keywords || []).length > 0 && (
                                        <div className="table-wrap" style={{ marginTop: 14 }}>
                                            <table>
                                                <thead><tr><th>키워드</th><th>현재 순위</th><th>페이지</th><th>최근 체크</th></tr></thead>
                                                <tbody>
                                                    {p.keywords.map(k => (
                                                        <tr key={k.id} style={{ cursor: 'pointer' }} onClick={() => { setExpandedProduct(p.id === expandedProduct ? null : p.id); loadHistory(k.id); }}>
                                                            <td style={{ fontWeight: 500 }}>{k.keyword}</td>
                                                            <td>
                                                                {k.latest_rank ? (
                                                                    <span style={{ fontWeight: 700, color: k.latest_rank <= 10 ? '#059669' : k.latest_rank <= 40 ? '#d97706' : '#dc2626' }}>
                                                                        {k.latest_rank}위
                                                                    </span>
                                                                ) : <span className="badge badge-gray">미노출</span>}
                                                            </td>
                                                            <td>{k.latest_rank ? `${Math.ceil(k.latest_rank / 40)}P` : '-'}</td>
                                                            <td style={{ fontSize: 12, color: '#94a3b8' }}>{k.last_checked ? new Date(k.last_checked).toLocaleString('ko') : '-'}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            </div>
        );
    }

    // ==================== SEO 진단 섹션 ====================

        const [productUrl, setProductUrl] = useState('');

        const [loading, setLoading] = useState(false);

            if (!productUrl || !keyword) return;
            setLoading(true);
            try {
                const res = await api.post('/seo/analyze', { product_url: productUrl, keyword });
                if (res.success) setResult(res.data);
                else alert(res.detail || 'SEO 분석 실패');
            } catch (e) { alert('SEO 분석 실패: ' + e.message); }
            setLoading(false);
        };

        const scoreColor = (s) => s >= 70 ? '#059669' : s >= 40 ? '#d97706' : '#dc2626';
        const scoreBg = (s) => s >= 70 ? '#ecfdf5' : s >= 40 ? '#fffbeb' : '#fef2f2';

        return (
            <div className="section fade-in" id="sec-seo">
                <div className="container">
                    <div className="section-title">
                        <span className="icon" style={{ background: '#faf5ff' }}>🏥</span>

                        <div style={{ display: 'flex', gap: 10 }}>
                            <input className="form-input" placeholder="분석할 상품 URL을 입력하세요" value={productUrl} onChange={e => setProductUrl(e.target.value)} style={{ flex: 1 }} />

                                {loading ? '분석 중...' : 'SEO 진단'}
                            </button>

                        {keyword && <div style={{ fontSize: 12, color: '#64748b', marginTop: 8 }}>기준 키워드: <strong>{keyword}</strong></div>}

                    {result && !loading && (
                        <div className="fade-in">
                            <div className="card-grid card-grid-4" style={{ marginBottom: 16 }}>
                                {[
                                    { label: '종합 점수', value: result.scores.total, icon: '📊' },
                                    { label: '상품명', value: result.scores.title, icon: '📝' },
                                    { label: '가격 경쟁력', value: result.scores.price, icon: '💰' },
                                    { label: '순위 점수', value: result.scores.rank, icon: '📈' },
                                ].map((item, i) => (
                                    <div className="card" key={i} style={{ textAlign: 'center' }}>
                                        <div style={{ fontSize: 20, marginBottom: 6 }}>{item.icon}</div>
                                        <div className="score-ring" style={{ background: scoreBg(item.value), color: scoreColor(item.value), width: 64, height: 64, fontSize: 18 }}>
                                            {item.value}
                                        </div>
                                        <div style={{ fontSize: 12, fontWeight: 600, color: '#64748b' }}>{item.label}</div>
                                    </div>
                                ))}
                            </div>

                            {result.suggestions?.length > 0 && (
                                <div className="card">
                                    <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 10 }}>💡 개선 제안</div>
                                    {result.suggestions.map((s, i) => (
                                        <div key={i} style={{ padding: '8px 0', borderBottom: i < result.suggestions.length - 1 ? '1px solid #f1f5f9' : 'none', fontSize: 13, color: '#334155', display: 'flex', gap: 8 }}>
                                            <span style={{ color: '#3b82f6', flexShrink: 0 }}>•</span>{s}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

        );

    // ==================== 보고서 섹션 ====================
    function ReportSection() {
        const [format, setFormat] = useState('json');
        const [days, setDays] = useState(30);
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(false);

        const handleExport = async () => {
            setLoading(true);
            try {
                const res = await api.post('/report/export', { format, date_range: days });
                if (res.success) setData(res.data);
            } catch (e) { alert('보고서 생성 실패'); }
            setLoading(false);
        };

        const handleDownloadCSV = () => {
            if (!data?.content) return;
            const bom = '\uFEFF';
            const blob = new Blob([bom + data.content], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `로직분석_보고서_${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        };

        return (
            <div className="section fade-in" id="sec-report">
                <div className="container">
                    <div className="section-title">
                        <span className="icon" style={{ background: '#eff6ff' }}>📄</span>
                        보고서 내보내기
                    </div>
                    <div className="card">
                        <div style={{ display: 'flex', gap: 12, alignItems: 'flex-end', flexWrap: 'wrap' }}>
                            <div className="form-group" style={{ marginBottom: 0 }}>
                                <label className="form-label">형식</label>
                                <select className="form-input" style={{ width: 120 }} value={format} onChange={e => setFormat(e.target.value)}>
                                    <option value="json">JSON</option>
                                    <option value="csv">CSV</option>
                                </select>
                            </div>
                            <div className="form-group" style={{ marginBottom: 0 }}>
                                <label className="form-label">기간</label>
                                <select className="form-input" style={{ width: 120 }} value={days} onChange={e => setDays(Number(e.target.value))}>
                                    <option value={7}>최근 7일</option>
                                    <option value={14}>최근 14일</option>
                                    <option value={30}>최근 30일</option>
                                    <option value={90}>최근 90일</option>
                                </select>
                            </div>
                            <button className="btn btn-primary" onClick={handleExport} disabled={loading}>
                                {loading ? '생성 중...' : '보고서 생성'}
                            </button>
                            {data?.format === 'csv' && (
                                <button className="btn btn-secondary" onClick={handleDownloadCSV}>📥 CSV 다운로드</button>
                            )}
                        </div>

                        {data && data.format === 'json' && (
                            <div style={{ marginTop: 16 }}>
                                <div style={{ display: 'flex', gap: 16, marginBottom: 12 }}>
                                    <span className="badge badge-blue">상품 {data.total_products}개</span>
                                    <span className="badge badge-green">키워드 {data.total_keywords}개</span>
                                    <span className="badge badge-gray">{data.generated_at?.slice(0, 10)}</span>
                                </div>
                                <div className="table-wrap" style={{ maxHeight: 300, overflow: 'auto' }}>
                                    <table>
                                        <thead><tr><th>상품명</th><th>키워드</th><th>최근 순위</th><th>이력 수</th></tr></thead>
                                        <tbody>
                                            {(data.items || []).map((item, i) => (
                                                <tr key={i}>
                                                    <td style={{ maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.product_name}</td>
                                                    <td>{item.keyword}</td>
                                                    <td style={{ fontWeight: 600 }}>{item.latest_rank ? `${item.latest_rank}위` : '-'}</td>
                                                    <td>{item.history_count}건</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            </div>
        );
    }

    // ==================== 알림 설정 섹션 (간략) ====================
    function NotificationSection() {
        const [settings, setSettings] = useState(null);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
            api.get('/notify/settings').then(res => {
                if (res.success) setSettings(res.data);
                setLoading(false);
            }).catch(() => setLoading(false));
        }, []);

        const toggleNotify = async (enabled) => {
            const res = await api.put('/notify/settings', { notify_enabled: enabled });
            if (res.success) setSettings(res.data);
        };

        if (loading) return null;
        if (!settings) return null;

        return (
            <div className="section" id="sec-notify">
                <div className="container">
                    <div className="section-title">
                        <span className="icon" style={{ background: '#fffbeb' }}>🔔</span>
                        알림 설정
                    </div>
                    <div className="card">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <div>
                                <div style={{ fontWeight: 600, fontSize: 14 }}>일일 리포트 알림</div>
                                <div style={{ fontSize: 12, color: '#64748b', marginTop: 2 }}>

                                </div>

                            <div className="alert alert-info" style={{ marginTop: 12, marginBottom: 0 }}>

    // ==================== 메인 앱 ====================
    function App() {
        const [health, setHealth] = useState(false);
        const [products, setProducts] = useState([]);
        const [searchLoading, setSearchLoading] = useState(false);
        const [searchedKeyword, setSearchedKeyword] = useState('');

        // 검색 결과
        const [volumeData, setVolumeData] = useState(null);
        const [relatedData, setRelatedData] = useState(null);

        // 헬스체크
        useEffect(() => {
            api.get('/health').then(res => setHealth(res.status === 'ok')).catch(() => setHealth(false));
        }, []);

        // 상품 목록 로드
        const loadProducts = useCallback(() => {
            api.get('/products').then(res => {
                if (res.success) setProducts(res.data);
            }).catch(() => {});
        }, []);

        useEffect(() => { loadProducts(); }, [loadProducts]);

        // 통합 검색
        const handleSearch = async (keyword) => {
            setSearchLoading(true);
            setSearchedKeyword(keyword);
            setVolumeData(null);
            setRelatedData(null);

            try {
                // 병렬로 검색량 + 연관키워드 호출
                const [volRes, relRes] = await Promise.all([
                    api.post('/keyword/volume', [keyword]).catch(() => null),
                    api.post('/keywords/related', { keyword }).catch(() => null),
                ]);

                if (volRes?.success) setVolumeData(volRes.data);
                if (relRes?.success) setRelatedData(relRes.data);
            } catch (e) {
                console.error('검색 오류:', e);
            }
            setSearchLoading(false);
        };

        // 앵커 네비게이션
        const sections = [
            { id: 'sec-rank', label: '순위 추적' },
            { id: 'sec-volume', label: '검색량', show: !!volumeData },
            { id: 'sec-related', label: '연관 키워드', show: !!relatedData },
            { id: 'sec-seo', label: 'SEO 진단' },
            { id: 'sec-productname', label: '상품명 분석' },
            { id: 'sec-report', label: '보고서' },
            { id: 'sec-notify', label: '알림' },
        ].filter(s => s.show !== false);

        const scrollTo = (id) => {
            document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        return (
            <div>
                <TopBar health={health} />
                <SearchBar onSearch={handleSearch} loading={searchLoading} />

                {/* 앵커 네비 */}
                <div style={{ background: '#fff', borderBottom: '1px solid #e8ecf1', padding: '10px 0', position: 'sticky', top: 64, zIndex: 40 }}>
                    <div className="container">
                        <div className="anchor-nav">
                            {sections.map(s => (
                                <button key={s.id} className="anchor-btn" onClick={() => scrollTo(s.id)}>{s.label}</button>
                            ))}
                        </div>
                    </div>
                </div>

                {/* 대시보드 요약 */}
                <DashboardSummary products={products} searchResult={relatedData} />

                {/* 검색 로딩 */}
                {searchLoading && (
                    <div className="section">
                        <div className="container">
                            <LoadingSpinner text={`"${searchedKeyword}" 분석 중... 약 5~10초 소요됩니다`} />
                        </div>
                    </div>
                )}

                {/* 순위 추적 */}
                <RankTrackingSection products={products} refreshProducts={loadProducts} />

                {/* 키워드 검색량 */}
                {volumeData && <KeywordVolumeSection keyword={searchedKeyword} data={volumeData} />}

                {/* 연관/황금 키워드 */}
                {relatedData && <RelatedKeywordsSection data={relatedData} />}

                {/* SEO 진단 */}
                <SeoDiagnosisSection keyword={searchedKeyword} />

                {/* 상품명 분석 */}

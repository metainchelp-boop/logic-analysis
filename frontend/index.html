<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로직 분석 v2 - 네이버 쇼핑 키워드 분석 & 순위 추적</title>

    <!-- React & ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

    <!-- Babel Standalone (JSX 변환용) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <!-- Tailwind CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">

    <!-- Noto Sans KR 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1a202c;
        }

        #root {
            min-height: 100vh;
        }

        /* 글래스모피즘 카드 */
        .glassmorphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        .dark-glassmorphism {
            background: rgba(30, 30, 48, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #e2e8f0;
        }

        /* 차트 컨테이너 */
        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }

        /* 배지 스타일 */
        .badge-rank {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-rank-up {
            background-color: #fee2e2;
            color: #dc2626;
        }

        .badge-rank-down {
            background-color: #dbeafe;
            color: #2563eb;
        }

        .badge-rank-same {
            background-color: #f3f4f6;
            color: #6b7280;
        }

        /* 경쟁강도 배지 */
        .competition-very-low {
            background-color: #d1fae5;
            color: #065f46;
        }

        .competition-low {
            background-color: #bfdbfe;
            color: #1e40af;
        }

        .competition-medium {
            background-color: #fef08a;
            color: #713f12;
        }

        .competition-high {
            background-color: #fed7aa;
            color: #92400e;
        }

        .competition-very-high {
            background-color: #fecaca;
            color: #7f1d1d;
        }

        /* 진입 추천 배지 */
        .recommend-good {
            background-color: #d1fae5;
            color: #065f46;
        }

        .recommend-neutral {
            background-color: #fef08a;
            color: #713f12;
        }

        .recommend-bad {
            background-color: #fecaca;
            color: #7f1d1d;
        }

        /* 모달 */
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        /* 사이드바 아이콘 */
        .sidebar-icon {
            display: inline-block;
            margin-right: 8px;
            font-size: 18px;
        }

        /* 토글 스위치 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #667eea;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }

        /* 폼 입력 */
        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* 버튼 */
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .btn-primary {
            background-color: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background-color: #f3f4f6;
            color: #1f2937;
            border: 1px solid #d1d5db;
        }

        .btn-secondary:hover {
            background-color: #e5e7eb;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* 애니메이션 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        /* 테이블 스타일 */
        .table-header {
            background-color: #f9fafb;
            font-weight: 600;
            border-bottom: 2px solid #e5e7eb;
        }

        .table-row {
            border-bottom: 1px solid #e5e7eb;
            transition: background-color 0.2s;
        }

        .table-row:hover {
            background-color: #f9fafb;
        }
    </style>
</head>

        // 경쟁강도 배지 컴포넌트
        function CompetitionBadge({ grade }) {
            const gradeMap = {
                '매우 낮음': { class: 'competition-very-low', label: '매우 낮음' },
                '낮음': { class: 'competition-low', label: '낮음' },
                '보통': { class: 'competition-medium', label: '보통' },
                '높음': { class: 'competition-high', label: '높음' },
                '매우 높음': { class: 'competition-very-high', label: '매우 높음' }
            };
            const style = gradeMap[grade] || gradeMap['보통'];
            return <span className={`badge-rank ${style.class}`}>{style.label}</span>;
        }

        // 진입 추천 배지 컴포넌트
        function RecommendBadge({ recommend }) {
            const recommendMap = {
                '추천': { class: 'recommend-good', label: '✓ 추천' },
                '보통': { class: 'recommend-neutral', label: '△ 보통' },
                '비추천': { class: 'recommend-bad', label: '✗ 비추천' }
            };
            const style = recommendMap[recommend] || recommendMap['보통'];
            return <span className={`badge-rank ${style.class}`}>{style.label}</span>;
        }

        // 순위 변동 배지 컴포넌트
        function RankTrendBadge({ prevRank, currentRank }) {
            let trend, label;
            if (currentRank < prevRank) {
                trend = 'badge-rank-up';
                label = `↑${prevRank - currentRank}`;
            } else if (currentRank > prevRank) {
                trend = 'badge-rank-down';
                label = `↓${currentRank - prevRank}`;
            } else {
                trend = 'badge-rank-same';
                label = '→';
            }
            return <span className={`badge-rank ${trend}`}>{label}</span>;
        }

        // 순위 추적 페이지
        function RankTrackingPage() {
            const [activeTab, setActiveTab] = useState('daily');
            const [showProductModal, setShowProductModal] = useState(false);
            const [showChartModal, setShowChartModal] = useState(false);
            const [showRealtimeForm, setShowRealtimeForm] = useState(false);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [realtimeKeyword, setRealtimeKeyword] = useState('');
            const [realtimeResult, setRealtimeResult] = useState(null);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (showChartModal && chartRef.current && selectedProduct) {
                    const ctx = chartRef.current.getContext('2d');
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    const chartKey = `${selectedProduct.name}|${selectedProduct.keywords[0].keyword}`;
                    const historyData = DEMO_DATA.rankHistory[chartKey] || [20, 19, 18, 17, 16, 15, 16, 17, 18, 20];

                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['D-9', 'D-8', 'D-7', 'D-6', 'D-5', 'D-4', 'D-3', 'D-2', 'D-1', '오늘'],
                            datasets: [
                                {
                                    label: '순위',
                                    data: historyData,
                                    borderColor: '#667eea',
                                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                                    borderWidth: 3,
                                    fill: true,
                                    tension: 0.4,
                                    pointBackgroundColor: '#667eea',
                                    pointBorderColor: '#fff',
                                    pointBorderWidth: 2,
                                    pointRadius: 5,
                                    pointHoverRadius: 7
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    labels: {
                                        font: { family: "'Noto Sans KR', sans-serif", size: 14, weight: '600' },
                                        color: '#1f2937'
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    reverse: true,
                                    beginAtZero: true,
                                    max: 100,
                                    ticks: {
                                        font: { family: "'Noto Sans KR', sans-serif" },
                                        color: '#6b7280'
                                    },
                                    grid: {
                                        color: 'rgba(0, 0, 0, 0.05)'
                                    }
                                },
                                x: {
                                    ticks: {
                                        font: { family: "'Noto Sans KR', sans-serif", size: 12 },
                                        color: '#6b7280'
                                    },
                                    grid: {
                                        display: false
                                    }
                                }
                            }
                        }
                    });
                }

                return () => {
                    if (chartInstance.current && showChartModal === false) {
                        chartInstance.current.destroy();
                    }
                };
            }, [showChartModal, selectedProduct]);

            const handleRealtimeSearch = async () => {
                if (!realtimeKeyword.trim()) return;

                try {
                    const response = await fetch(`${API_BASE}/api/rank/realtime?keyword=${encodeURIComponent(realtimeKeyword)}`);
                    if (response.ok) {
                        const data = await response.json();
                        setRealtimeResult(data);
                    } else {
                        // 데모 데이터로 폴백
                        setRealtimeResult({
                            keyword: realtimeKeyword,
                            results: [
                                { rank: 3, name: 'Smart Watch Pro 시리즈', category: 'Electronics', rating: 4.8 },
                                { rank: 8, name: 'Competitor Product 1', category: 'Electronics', rating: 4.5 },
                                { rank: 15, name: 'Competitor Product 2', category: 'Premium', rating: 4.7 }
                            ]
                        });
                    }
                } catch (error) {
                    console.warn('실시간 순위 조회 실패, 데모 데이터 사용:', error);
                    setRealtimeResult({
                        keyword: realtimeKeyword,
                        results: [
                            { rank: 3, name: 'Smart Watch Pro 시리즈', category: 'Electronics', rating: 4.8 },
                            { rank: 8, name: 'Competitor Product 1', category: 'Electronics', rating: 4.5 }
                        ]
                    });
                }
            };

            return (
                <div className="fade-in">
                    {/* 탭 네비게이션 */}
                    <div className="flex gap-4 mb-6 border-b border-gray-300">
                        <button
                            onClick={() => setActiveTab('daily')}
                            className={`pb-3 px-1 font-semibold text-sm transition-colors ${
                                activeTab === 'daily'
                                    ? 'border-b-2 border-purple-600 text-purple-600'
                                    : 'text-gray-600 hover:text-gray-800'
                            }`}
                        >
                            📊 일간 랭킹 추적
                        </button>
                        <button
                            onClick={() => setActiveTab('realtime')}
                            className={`pb-3 px-1 font-semibold text-sm transition-colors ${
                                activeTab === 'realtime'
                                    ? 'border-b-2 border-purple-600 text-purple-600'
                                    : 'text-gray-600 hover:text-gray-800'
                            }`}
                        >
                            ⚡ 실시간 순위 조회
                        </button>
                    </div>

                    {activeTab === 'daily' ? (
                        <div>
                            {/* 요약 카드 */}
                            <div className="grid grid-cols-3 gap-4 mb-6">
                                <div className="glassmorphism p-5 rounded-lg">
                                    <div className="text-gray-600 text-sm font-medium mb-2">추적 중인 상품</div>
                                    <div className="text-3xl font-bold text-gray-900">{DEMO_DATA.trackedProducts.length}</div>
                                </div>
                                <div className="glassmorphism p-5 rounded-lg">
                                    <div className="text-gray-600 text-sm font-medium mb-2">추적 중인 키워드</div>
                                    <div className="text-3xl font-bold text-gray-900">
                                        {DEMO_DATA.trackedProducts.reduce((sum, p) => sum + p.keywords.length, 0)}
                                    </div>
                                </div>
                                <div className="glassmorphism p-5 rounded-lg">
                                    <div className="text-gray-600 text-sm font-medium mb-2">오늘 순위 변동</div>
                                    <div className="text-3xl font-bold text-red-600">-2위</div>
                                </div>

        function SeoDiagnosisPage() {
            const [url, setUrl] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const radarChartRef = useRef(null);
            const radarChartInstance = useRef(null);

            useEffect(() => {
                if (result && radarChartRef.current) {
                    const ctx = radarChartRef.current.getContext('2d');
                    if (radarChartInstance.current) {
                        radarChartInstance.current.destroy();
                    }

                    radarChartInstance.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['적합도', '신뢰도', '인기도'],
                            datasets: [
                                {
                                    label: 'SEO 점수',
                                    data: [result.relevance, result.trust, result.popularity],
                                    borderColor: '#667eea',
                                    backgroundColor: 'rgba(102, 126, 234, 0.2)',
                                    borderWidth: 2,
                                    pointBackgroundColor: '#667eea',
                                    pointBorderColor: '#fff',
                                    pointBorderWidth: 2
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    labels: {
                                        font: { family: "'Noto Sans KR', sans-serif", size: 12, weight: '600' },
                                        color: '#1f2937'
                                    }
                                }
                            },
                            scales: {
                                r: {
                                    max: 100,
                                    ticks: {
                                        font: { family: "'Noto Sans KR', sans-serif" },
                                        color: '#6b7280'
                                    }
                                }
                            }
                        }
                    });
                }
            }, [result]);

            const handleAnalyze = async () => {
                if (!url.trim()) return;

                setLoading(true);
                try {
                    const response = await fetch(`${API_BASE}/api/seo/diagnose?url=${encodeURIComponent(url)}`);
                    if (response.ok) {
                        const data = await response.json();
                        setResult(data);
                    } else {
                        setResult(DEMO_DATA.seoDiagnosis);
                    }
                } catch (error) {
                    console.warn('SEO 진단 API 호출 실패:', error);
                    setResult(DEMO_DATA.seoDiagnosis);
                }
                setLoading(false);
            };

            const getGradeColor = (grade) => {
                const colors = { 'A': 'text-green-600', 'B': 'text-blue-600', 'C': 'text-yellow-600', 'D': 'text-orange-600', 'F': 'text-red-600' };
                return colors[grade] || 'text-gray-600';
            };

            return (
                <div className="fade-in space-y-6">

                        <div className="flex gap-3">

                                value={url}
                                onChange={(e) => setUrl(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && handleAnalyze()}
                                className="form-input flex-1"
                            />
                            <button
                                onClick={handleAnalyze}
                                disabled={loading}
                                className="btn btn-primary"
                            >
                                {loading ? '분석 중...' : '진단'}
                            </button>
                        </div>
                    </div>

                    {/* 결과 */}
                    {result && (

                            <div className="glassmorphism p-6 rounded-lg">
                                <div className="flex items-center gap-6">

                                        <div className={`text-7xl font-black ${getGradeColor(result.grade)}`}>
                                            {result.grade}
                                        </div>
                                    </div>
                                    <div className="flex-1">
                                        <h3 className="text-2xl font-bold text-gray-900 mb-1">SEO 평가: {result.gradeDescription}</h3>
                                        <p className="text-gray-600 text-sm">전체적인 SEO 최적화 수준입니다.</p>

            useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.slice(1) || '/rank-tracking';
                    const page = hash.startsWith('/') ? hash.slice(1) : hash;
                    setCurrentPage(page || 'rank-tracking');

                window.addEventListener('hashchange', handleHashChange);

                return () => window.removeEventListener('hashchange', handleHashChange);

            const navigateTo = (page) => {
                window.location.hash = `#/${page}`;
            };

            const menuItems = [
                { id: 'rank-tracking', label: '순위 추적', icon: '📊' },
                { id: 'keyword-analysis', label: '키워드 분석', icon: '🔍' },
                { id: 'related-keywords', label: '연관/황금 키워드', icon: '🔗' },
                { id: 'product-keyword', label: '상품명 분석', icon: '📝' },
                { id: 'seo-diagnosis', label: 'SEO 진단', icon: '🏥' },
                { id: 'notification', label: '알림톡 설정', icon: '🔔' },
                { id: 'reports', label: '보고서', icon: '📄' }
            ];

            const renderPage = () => {
                switch (currentPage) {
                    case 'rank-tracking':
                        return <RankTrackingPage />;
                    case 'keyword-analysis':
                        return <KeywordAnalysisPage />;
                    case 'related-keywords':
                        return <RelatedKeywordsPage />;
                    case 'product-keyword':
                        return <ProductKeywordPage />;
                    case 'seo-diagnosis':
                        return <SeoDiagnosisPage />;
                    case 'notification':
                        return <NotificationPage />;
                    case 'reports':
                        return <ReportsPage />;
                    default:
                        return <RankTrackingPage />;
                }
            };

            return (
                <div className="flex h-screen bg-gradient-to-br from-purple-600 via-indigo-600 to-purple-800">
                    {/* 사이드바 */}
                    <div
                        className={`${
                            sidebarOpen ? 'w-64' : 'w-20'
                        } dark-glassmorphism transition-all duration-300 flex flex-col border-r border-purple-500/20`}
                    >
                        <div className="p-4 border-b border-purple-400/20">
                            <div className="flex items-center gap-3">
                                <div className="text-2xl">📊</div>
                                {sidebarOpen && <span className="font-bold text-white">로직 분석 v2</span>}
                            </div>
                        </div>

                        <nav className="flex-1 p-3 space-y-2">
                            {menuItems.map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => navigateTo(item.id)}
                                    className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all ${
                                        currentPage === item.id
                                            ? 'bg-purple-500/40 text-white'
                                            : 'text-gray-300 hover:bg-purple-500/20 hover:text-white'
                                    }`}
                                >
                                    <span className="text-xl flex-shrink-0">{item.icon}</span>
                                    {sidebarOpen && <span className="text-sm font-medium">{item.label}</span>}
                                </button>
                            ))}
                        </nav>

                        <div className="p-3 border-t border-purple-400/20">
                            <div className="p-3 bg-purple-500/20 rounded-lg">
                                <div className="text-xs text-gray-300 font-semibold mb-2">⚙️ 시스템 상태</div>
                                {sidebarOpen && <SystemStatusPage />}
                            </div>
                        </div>

                        <div className="p-3 border-t border-purple-400/20">
                            <button
                                onClick={() => setSidebarOpen(!sidebarOpen)}
                                className="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-lg bg-purple-500/30 text-white hover:bg-purple-500/40 transition-all"
                            >
                                <span className="text-lg">{sidebarOpen ? '◀' : '▶'}</span>
                                {sidebarOpen && <span className="text-xs font-medium">접기</span>}
                            </button>
                        </div>
                    </div>

                    {/* 메인 콘텐츠 */}
                    <div className="flex-1 overflow-auto">
                        <div className="p-6">
                            <div className="max-w-7xl mx-auto">
                                {renderPage()}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // React 렌더링
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

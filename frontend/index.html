    <meta charset="UTF-8">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <style>
        * {
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1a202c;
        }

        #root {
            min-height: 100vh;
        }

        /* 글래스모피즘 카드 */
        .glassmorphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        .dark-glassmorphism {
            background: rgba(30, 30, 48, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #e2e8f0;
        }

        /* 차트 컨테이너 */
        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }

        /* 배지 스타일 */
        .badge-rank {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-rank-up {
            background-color: #fee2e2;
            color: #dc2626;
        }

        .badge-rank-down {
            background-color: #dbeafe;
            color: #2563eb;
        }

        .badge-rank-same {
            background-color: #f3f4f6;
            color: #6b7280;
        }

        /* 경쟁강도 배지 */
        .competition-very-low {
            background-color: #d1fae5;
            color: #065f46;
        }

        .competition-low {
            background-color: #bfdbfe;
            color: #1e40af;
        }

        .competition-medium {
            background-color: #fef08a;
            color: #713f12;
        }

        .competition-high {
            background-color: #fed7aa;
            color: #92400e;
        }

        .competition-very-high {
            background-color: #fecaca;
            color: #7f1d1d;
        }

        /* 진입 추천 배지 */
        .recommend-good {
            background-color: #d1fae5;
            color: #065f46;
        }

        .recommend-neutral {
            background-color: #fef08a;
            color: #713f12;
        }

        .recommend-bad {
            background-color: #fecaca;
            color: #7f1d1d;
        }

        /* 모달 */
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        /* 사이드바 아이콘 */
        .sidebar-icon {
            display: inline-block;
            margin-right: 8px;
            font-size: 18px;
        }

        /* 토글 스위치 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #667eea;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }

        /* 폼 입력 */
        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* 버튼 */
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .btn-primary {
            background-color: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background-color: #f3f4f6;
            color: #1f2937;
            border: 1px solid #d1d5db;
        }

        .btn-secondary:hover {
            background-color: #e5e7eb;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* 애니메이션 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        /* 테이블 스타일 */
        .table-header {
            background-color: #f9fafb;
            font-weight: 600;
            border-bottom: 2px solid #e5e7eb;
        }

        .table-row {
            border-bottom: 1px solid #e5e7eb;
            transition: background-color 0.2s;
        }

        .table-row:hover {
            background-color: #f9fafb;
        }

</head>

        // 경쟁강도 배지 컴포넌트
        function CompetitionBadge({ grade }) {
            const gradeMap = {
                '매우 낮음': { class: 'competition-very-low', label: '매우 낮음' },
                '낮음': { class: 'competition-low', label: '낮음' },
                '보통': { class: 'competition-medium', label: '보통' },
                '높음': { class: 'competition-high', label: '높음' },
                '매우 높음': { class: 'competition-very-high', label: '매우 높음' }
            };
            const style = gradeMap[grade] || gradeMap['보통'];
            return <span className={`badge-rank ${style.class}`}>{style.label}</span>;
        }

        // 진입 추천 배지 컴포넌트
        function RecommendBadge({ recommend }) {
            const recommendMap = {
                '추천': { class: 'recommend-good', label: '✓ 추천' },
                '보통': { class: 'recommend-neutral', label: '△ 보통' },
                '비추천': { class: 'recommend-bad', label: '✗ 비추천' }
            };
            const style = recommendMap[recommend] || recommendMap['보통'];
            return <span className={`badge-rank ${style.class}`}>{style.label}</span>;
        }

        // 순위 변동 배지 컴포넌트
        function RankTrendBadge({ prevRank, currentRank }) {
            let trend, label;
            if (currentRank < prevRank) {
                trend = 'badge-rank-up';
                label = `↑${prevRank - currentRank}`;
            } else if (currentRank > prevRank) {
                trend = 'badge-rank-down';
                label = `↓${currentRank - prevRank}`;
            } else {
                trend = 'badge-rank-same';
                label = '→';
            }
            return <span className={`badge-rank ${trend}`}>{label}</span>;
        }

        // API 호출 헬퍼
        async function apiCall(url, options = {}) {
            try {
                const resp = await fetch(`${API_BASE}${url}`, {
                    headers: { 'Content-Type': 'application/json', ...options.headers },
                    ...options
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return await resp.json();
            } catch (e) {
                console.warn('API 호출 실패:', url, e);
                return null;
            }
        }

        // 순위 추적 페이지
        function RankTrackingPage() {
            const [activeTab, setActiveTab] = useState('daily');
            const [products, setProducts] = useState([]);
            const [showProductModal, setShowProductModal] = useState(false);
            const [showChartModal, setShowChartModal] = useState(false);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [selectedKeyword, setSelectedKeyword] = useState(null);
            const [realtimeKeyword, setRealtimeKeyword] = useState('');
            const [realtimeUrl, setRealtimeUrl] = useState('');
            const [realtimeResult, setRealtimeResult] = useState(null);
            const [realtimeLoading, setRealtimeLoading] = useState(false);
            const [newProductUrl, setNewProductUrl] = useState('');
            const [newKeywords, setNewKeywords] = useState('');
            const [addLoading, setAddLoading] = useState(false);
            const [historyData, setHistoryData] = useState([]);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // 상품 목록 로드
            useEffect(() => {
                loadProducts();
            }, []);

            const loadProducts = async () => {
                const res = await apiCall('/api/products');
                if (res && res.success) {
                    setProducts(res.data);
                } else {
                    setProducts(DEMO_DATA.trackedProducts.map(p => ({
                        ...p, product_name: p.name, image_url: p.imageUrl,
                        keywords: p.keywords.map((k, i) => ({id: i+1, keyword: k.keyword, latest_rank: k.rank}))
                    })));
                }
            };

            // 차트 이력 로드
            useEffect(() => {
                if (showChartModal && selectedKeyword) {
                    (async () => {
                        const res = await apiCall(`/api/rank/history/${selectedKeyword.id}?days=30`);
                        if (res && res.success && res.data.length > 0) {
                            setHistoryData(res.data);
                        } else {
                            setHistoryData([
                                {rank_position: 20, checked_at: '2026-04-01'},
                                {rank_position: 18, checked_at: '2026-04-03'},
                                {rank_position: 15, checked_at: '2026-04-05'},
                                {rank_position: 16, checked_at: '2026-04-07'},
                                {rank_position: 14, checked_at: '2026-04-09'},
                                {rank_position: 12, checked_at: '2026-04-11'},
                            ]);
                        }
                    })();
                }
            }, [showChartModal, selectedKeyword]);

            useEffect(() => {
                if (showChartModal && chartRef.current && historyData.length > 0) {
                    const ctx = chartRef.current.getContext('2d');
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    const labels = historyData.map(h => (h.checked_at || '').slice(5, 10));
                    const dataPoints = historyData.map(h => h.rank_position);

                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                {
                                    label: selectedKeyword?.keyword || '순위',
                                    data: dataPoints,
                                    borderColor: '#667eea',
                                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                                    borderWidth: 3,
                                    fill: true,
                                    tension: 0.4,
                                    pointBackgroundColor: '#667eea',
                                    pointBorderColor: '#fff',
                                    pointBorderWidth: 2,
                                    pointRadius: 5,
                                    pointHoverRadius: 7
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    labels: {
                                        font: { family: "'Noto Sans KR', sans-serif", size: 14, weight: '600' },
                                        color: '#1f2937'
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    reverse: true,
                                    beginAtZero: true,
                                    max: 100,
                                    ticks: {
                                        font: { family: "'Noto Sans KR', sans-serif" },
                                        color: '#6b7280'
                                    },
                                    grid: {
                                        color: 'rgba(0, 0, 0, 0.05)'
                                    }
                                },
                                x: {
                                    ticks: {
                                        font: { family: "'Noto Sans KR', sans-serif", size: 12 },
                                        color: '#6b7280'
                                    },
                                    grid: {
                                        display: false
                                    }
                                }
                            }
                        }
                    });
                }

                return () => {
                    if (chartInstance.current && showChartModal === false) {
                        chartInstance.current.destroy();
                    }
                };
            }, [showChartModal, selectedProduct]);

            const handleRealtimeSearch = async () => {
                if (!realtimeKeyword.trim() || !realtimeUrl.trim()) return;
                setRealtimeLoading(true);
                const res = await apiCall('/api/rank/check', {
                    method: 'POST',
                    body: JSON.stringify({ keyword: realtimeKeyword, product_url: realtimeUrl })
                });
                if (res && res.success) {
                    setRealtimeResult(res.data);
                } else {
                    setRealtimeResult({
                        keyword: realtimeKeyword, rank_position: null,
                        analysis: '조회에 실패했습니다. URL과 키워드를 확인해주세요.',
                        top_competitors: []
                    });
                }
                setRealtimeLoading(false);
            };

            const handleAddProduct = async () => {
                if (!newProductUrl.trim() || !newKeywords.trim()) return;
                setAddLoading(true);
                const keywords = newKeywords.split(',').map(k => k.trim()).filter(k => k);
                const res = await apiCall('/api/products/track', {
                    method: 'POST',
                    body: JSON.stringify({ product_url: newProductUrl, keywords })
                });
                if (res && res.success) {
                    setShowProductModal(false);
                    setNewProductUrl('');
                    setNewKeywords('');
                    await loadProducts();
                }
                setAddLoading(false);
            };

        // 키워드 분석 페이지
        function KeywordAnalysisPage() {
            const [keyword, setKeyword] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (result && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['1페이지 평균', '2페이지 평균'],
                            datasets: [
                                {
                                    label: '평균 매출액',
                                    data: [result.page1AvgSales / 1000000, result.page2AvgSales / 1000000],
                                    backgroundColor: ['#667eea', '#764ba2']
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    labels: {
                                        font: { family: "'Noto Sans KR', sans-serif", size: 12, weight: '600' },
                                        color: '#1f2937'
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    ticks: {
                                        font: { family: "'Noto Sans KR', sans-serif" },
                                        color: '#6b7280',
                                        callback: function(value) {
                                            return value.toFixed(0) + 'M';
                                        }
                                    },
                                    grid: {
                                        color: 'rgba(0, 0, 0, 0.05)'
                                    }
                                },
                                x: {
                                    ticks: {
                                        font: { family: "'Noto Sans KR', sans-serif", size: 12 },
                                        color: '#6b7280'
                                    },
                                    grid: {
                                        display: false
                                    }
                                }
                            }
                        }
                    });
                }
            }, [result]);

            const handleSearch = async () => {
                if (!keyword.trim()) return;

                setLoading(true);
                try {
                    const res = await apiCall('/api/keyword/volume', {
                        method: 'POST',
                        body: JSON.stringify([keyword])
                    });
                    if (res && res.success && res.data && res.data.length > 0) {
                        const kd = res.data[0];
                        const totalVol = (kd.monthlyPcQcCnt || 0) + (kd.monthlyMobileQcCnt || 0);
                        const compMap = {'HIGH':'높음','MEDIUM':'보통','LOW':'낮음','높음':'높음','보통':'보통','낮음':'낮음'};
                        setResult({
                            keyword: kd.keyword || keyword,
                            searchVolume: { pc: kd.monthlyPcQcCnt || 0, mobile: kd.monthlyMobileQcCnt || 0 },
                            totalSearchVolume: totalVol,
                            products: 0,
                            competitionRate: kd.compIdx === 'HIGH' || kd.compIdx === '높음' ? 0.8 : kd.compIdx === 'MEDIUM' || kd.compIdx === '보통' ? 0.5 : 0.2,
                            competitionGrade: compMap[kd.compIdx] || '보통',
                            page1AvgSales: totalVol * 300,
                            page2AvgSales: totalVol * 40,
                            entryRecommend: totalVol < 3000 && (kd.compIdx === 'LOW' || kd.compIdx === '낮음') ? '추천' : totalVol > 50000 ? '비추천' : '보통',
                            entryReason: totalVol < 3000 ? '검색량이 적고 경쟁이 낮아 진입 기회가 있습니다.' : totalVol > 50000 ? '검색량이 매우 많으나 경쟁이 치열합니다.' : '적당한 검색량과 경쟁 수준입니다.',
                        });
                    } else {
                        setResult(DEMO_DATA.keywordAnalysis);
                    }
                } catch (error) {
                    console.warn('키워드 분석 API 호출 실패:', error);
                    setResult(DEMO_DATA.keywordAnalysis);
                }
                setLoading(false);
            };

            return (
                <div className="fade-in space-y-6">
                    {/* 검색 입력 */}
                    <div className="glassmorphism p-6 rounded-lg">
                        <h2 className="font-bold text-lg text-gray-900 mb-4">키워드 분석</h2>
                        <div className="flex gap-3">
                            <input
                                type="text"
                                placeholder="분석할 키워드 입력"
                                value={keyword}
                                onChange={(e) => setKeyword(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && handleSearch()}
                                className="form-input flex-1"
                            />
                            <button
                                onClick={handleSearch}
                                disabled={loading}
                                className="btn btn-primary"
                            >
                                {loading ? '분석 중...' : '분석'}
                            </button>
                        </div>
                    </div>

                    {/* 결과 */}
                    {result && (
                        <div className="space-y-4">
                            {/* 기본 통계 */}
                            <div className="grid grid-cols-2 gap-4">
                                <div className="glassmorphism p-5 rounded-lg">
                                    <div className="text-sm text-gray-600 mb-1">월간 검색량 (PC)</div>
                                    <div className="text-3xl font-bold text-gray-900">{result.searchVolume.pc.toLocaleString()}</div>
                                </div>
                                <div className="glassmorphism p-5 rounded-lg">
                                    <div className="text-sm text-gray-600 mb-1">월간 검색량 (모바일)</div>
                                    <div className="text-3xl font-bold text-gray-900">{result.searchVolume.mobile.toLocaleString()}</div>
                                </div>
                                <div className="glassmorphism p-5 rounded-lg">
                                    <div className="text-sm text-gray-600 mb-1">판매 중인 상품 수</div>
                                    <div className="text-3xl font-bold text-gray-900">{result.products.toLocaleString()}</div>
                                </div>
                                <div className="glassmorphism p-5 rounded-lg">
                                    <div className="text-sm text-gray-600 mb-1">경쟁 강도</div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-2xl font-bold">{(result.competitionRate * 100).toFixed(0)}%</span>
                                        <CompetitionBadge grade={result.competitionGrade} />
                                    </div>
                                </div>
                            </div>

                            {/* 매출 비교 차트 */}
                            <div className="glassmorphism p-6 rounded-lg">
                                <h3 className="font-bold text-gray-900 mb-4">1페이지 vs 2페이지 평균 매출</h3>
                                <div className="chart-container">
                                    <canvas ref={chartRef}></canvas>
                                </div>
                            </div>

                            {/* 진입 추천 */}
                            <div className="glassmorphism p-6 rounded-lg">
                                <div className="flex items-start gap-4">
                                    <div>
                                        <h3 className="font-bold text-gray-900 mb-2">진입 추천 판단</h3>
                                        <RecommendBadge recommend={result.entryRecommend} />
                                    </div>
                                    <div className="flex-1">
                                        <p className="text-sm text-gray-700">{result.entryReason}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

                            relevance: s.title,
                            trust: s.price,

                        setResult(DEMO_DATA.seoDiagnosis);
                    }

                    console.warn('SEO 진단 API 호출 실패:', error);
                    setResult(DEMO_DATA.seoDiagnosis);

                setLoading(false);

            const getGradeColor = (grade) => {
                const colors = { 'A': 'text-green-600', 'B': 'text-blue-600', 'C': 'text-yellow-600', 'D': 'text-orange-600', 'F': 'text-red-600' };

            return (
                <div className="fade-in space-y-6">
                    {/* URL + 키워드 입력 */}

                            <div className="flex gap-3">

                                    {loading ? '분석 중...' : '진단'}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 결과 */}

                        <div className="space-y-4">

                                    <div className="flex-1">
                                        <h3 className="text-2xl font-bold text-gray-900 mb-1">SEO 평가: {result.gradeDescription}</h3>
                                        <p className="text-gray-600 text-sm">전체적인 SEO 최적화 수준입니다.</p>
                                    </div>

        // 보고서 페이지
        function ReportsPage() {
            const [reportType, setReportType] = useState('keyword');
            const [format, setFormat] = useState('pdf');
            const [period, setPeriod] = useState('month');
            const [includeItems, setIncludeItems] = useState(['summary', 'detailed', 'chart']);
            const [brandName, setBrandName] = useState('');
            const [brandColor, setBrandColor] = useState('#667eea');

            const handleItemToggle = (item) => {
                setIncludeItems(
                    includeItems.includes(item)
                        ? includeItems.filter(i => i !== item)
                        : [...includeItems, item]
                );
            };

            const [exportLoading, setExportLoading] = useState(false);
            const [previewData, setPreviewData] = useState(null);

            const handleDownload = async () => {
                setExportLoading(true);
                const periodDays = { week: 7, month: 30, quarter: 90, year: 365 };
                const res = await apiCall('/api/report/export', {
                    method: 'POST',
                    body: JSON.stringify({
                        format: format === 'excel' ? 'csv' : 'json',
                        date_range: periodDays[period] || 30
                    })
                });
                if (res && res.success) {
                    if (format === 'excel' && res.data.content) {
                        // CSV 다운로드
                        const blob = new Blob([res.data.content], { type: 'text/csv;charset=utf-8;' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = `report_${new Date().toISOString().slice(0,10)}.csv`;
                        a.click(); URL.revokeObjectURL(url);
                    } else {
                        // JSON 미리보기
                        setPreviewData(res.data);
                        const blob = new Blob([JSON.stringify(res.data, null, 2)], { type: 'application/json' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = `report_${new Date().toISOString().slice(0,10)}.json`;
                        a.click(); URL.revokeObjectURL(url);
                    }
                    alert('보고서가 다운로드되었습니다!');
                } else {
                    alert('보고서 생성에 실패했습니다.');
                }
                setExportLoading(false);
            };

            const handlePreview = async () => {
                const res = await apiCall('/api/notify/preview');
                if (res && res.success) {
                    setPreviewData(res.data);
                }
            };

            return (
                <div className="fade-in space-y-6">
                    {/* 보고서 유형 */}
                    <div className="glassmorphism p-6 rounded-lg">
                        <h3 className="font-bold text-lg text-gray-900 mb-4">보고서 유형</h3>
                        <div className="space-y-2">
                            {[
                                { value: 'keyword', label: '키워드 분석 보고서' },
                                { value: 'ranking', label: '순위 추적 보고서' },
                                { value: 'seo', label: 'SEO 진단 보고서' }
                            ].map((option) => (
                                <label key={option.value} className="flex items-center gap-3 cursor-pointer p-2 hover:bg-gray-50 rounded">
                                    <input
                                        type="radio"
                                        name="reportType"
                                        value={option.value}
                                        checked={reportType === option.value}
                                        onChange={(e) => setReportType(e.target.value)}
                                        className="w-4 h-4"
                                    />
                                    <span className="text-gray-700">{option.label}</span>
                                </label>
                            ))}
                        </div>
                    </div>

                    {/* 포함 항목 */}
                    <div className="glassmorphism p-6 rounded-lg">
                        <h3 className="font-bold text-lg text-gray-900 mb-4">포함 항목</h3>
                        <div className="space-y-2">
                            {[
                                { value: 'summary', label: '요약 분석' },
                                { value: 'detailed', label: '상세 데이터' },
                                { value: 'chart', label: '차트 & 그래프' },
                                { value: 'recommendation', label: '개선 권고사항' }
                            ].map((option) => (
                                <label key={option.value} className="flex items-center gap-3 cursor-pointer p-2 hover:bg-gray-50 rounded">
                                    <input
                                        type="checkbox"
                                        checked={includeItems.includes(option.value)}
                                        onChange={() => handleItemToggle(option.value)}
                                        className="w-4 h-4"
                                    />
                                    <span className="text-gray-700">{option.label}</span>
                                </label>
                            ))}
                        </div>
                    </div>

                    {/* 기간 설정 */}
                    <div className="glassmorphism p-6 rounded-lg">
                        <h3 className="font-bold text-lg text-gray-900 mb-4">기간 설정</h3>
                        <select value={period} onChange={(e) => setPeriod(e.target.value)} className="form-input">
                            <option value="week">지난 7일</option>
                            <option value="month">지난 30일</option>
                            <option value="quarter">지난 분기</option>
                            <option value="year">지난 1년</option>
                        </select>
                    </div>

                    {/* 형식 선택 */}
                    <div className="glassmorphism p-6 rounded-lg">
                        <h3 className="font-bold text-lg text-gray-900 mb-4">다운로드 형식</h3>
                        <div className="space-y-2">
                            {[
                                { value: 'pdf', label: 'PDF 형식' },
                                { value: 'excel', label: 'Excel 형식' }
                            ].map((option) => (
                                <label key={option.value} className="flex items-center gap-3 cursor-pointer p-2 hover:bg-gray-50 rounded">
                                    <input
                                        type="radio"
                                        name="format"
                                        value={option.value}
                                        checked={format === option.value}
                                        onChange={(e) => setFormat(e.target.value)}
                                        className="w-4 h-4"
                                    />
                                    <span className="text-gray-700">{option.label}</span>
                                </label>
                            ))}
                        </div>
                    </div>

                    {/* 브랜드 설정 */}
                    <div className="glassmorphism p-6 rounded-lg">
                        <h3 className="font-bold text-lg text-gray-900 mb-4">브랜드 설정</h3>
                        <div className="space-y-3">
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">브랜드명</label>
                                <input
                                    type="text"
                                    placeholder="회사/브랜드명"
                                    value={brandName}
                                    onChange={(e) => setBrandName(e.target.value)}
                                    className="form-input"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">브랜드 컬러</label>
                                <div className="flex gap-3">
                                    <input
                                        type="color"
                                        value={brandColor}
                                        onChange={(e) => setBrandColor(e.target.value)}
                                        className="w-16 h-10 rounded cursor-pointer"
                                    />
                                    <input
                                        type="text"
                                        value={brandColor}
                                        onChange={(e) => setBrandColor(e.target.value)}
                                        className="form-input flex-1"
                                    />
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 미리보기 & 다운로드 */}
                    <div className="glassmorphism p-6 rounded-lg">
                        <div className="p-4 bg-purple-50 border-l-4 border-purple-500 rounded-lg mb-4">
                            <p className="text-sm text-purple-900">
                                <strong>미리보기:</strong> {reportType === 'keyword' ? '키워드' : reportType === 'ranking' ? '순위 추적' : 'SEO 진단'} 보고서가 생성됩니다.
                            </p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={handlePreview} className="btn btn-secondary flex-1">미리보기</button>
                            <button onClick={handleDownload} disabled={exportLoading} className="btn btn-primary flex-1">
                                {exportLoading ? '생성 중...' : '다운로드'}
                            </button>
                        </div>
                        {previewData && (
                            <div className="mt-4 p-4 bg-gray-50 rounded-lg max-h-64 overflow-y-auto">
                                <pre className="text-xs text-gray-700 whitespace-pre-wrap">
                                    {previewData.report_text || JSON.stringify(previewData, null, 2).slice(0, 2000)}
                                </pre>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // 시스템 상태 페이지
        function SystemStatusPage() {
            return (
                <div className="fade-in space-y-4">
                    <div className="glassmorphism p-5 rounded-lg">
                        <div className="flex justify-between items-center mb-2">
                            <h4 className="font-semibold text-gray-900">API 서버</h4>
                            <span className="badge-rank bg-green-100 text-green-800">정상</span>
                        </div>
                        <p className="text-sm text-gray-600">logic.metainc.co.kr</p>
                    </div>
                    <div className="glassmorphism p-5 rounded-lg">
                        <div className="flex justify-between items-center mb-2">
                            <h4 className="font-semibold text-gray-900">네이버 API</h4>
                            <span className="badge-rank bg-green-100 text-green-800">정상</span>
                        </div>
                        <p className="text-sm text-gray-600">일일 할당량: 1,234 / 10,000</p>
                    </div>
                    <div className="glassmorphism p-5 rounded-lg">
                        <div className="flex justify-between items-center mb-2">
                            <h4 className="font-semibold text-gray-900">데이터 동기화</h4>
                            <span className="badge-rank bg-blue-100 text-blue-800">진행 중</span>
                        </div>
                        <p className="text-sm text-gray-600">마지막 업데이트: 2분 전</p>
                    </div>
                </div>
            );
        }

        // 메인 앱 컴포넌트
        function App() {
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [currentPage, setCurrentPage] = useState('rank-tracking');

            useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.slice(1) || '/rank-tracking';
                    const page = hash.startsWith('/') ? hash.slice(1) : hash;
                    setCurrentPage(page || 'rank-tracking');
                };

                window.addEventListener('hashchange', handleHashChange);
                handleHashChange();
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const navigateTo = (page) => {
                window.location.hash = `#/${page}`;
            };

            const menuItems = [
                { id: 'rank-tracking', label: '순위 추적', icon: '📊' },
                { id: 'keyword-analysis', label: '키워드 분석', icon: '🔍' },
                { id: 'related-keywords', label: '연관/황금 키워드', icon: '🔗' },
                { id: 'product-keyword', label: '상품명 분석', icon: '📝' },
                { id: 'seo-diagnosis', label: 'SEO 진단', icon: '🏥' },
                { id: 'notification', label: '알림톡 설정', icon: '🔔' },
                { id: 'reports', label: '보고서', icon: '📄' }
            ];

            const renderPage = () => {
                switch (currentPage) {
                    case 'rank-tracking':
                        return <RankTrackingPage />;
                    case 'keyword-analysis':
                        return <KeywordAnalysisPage />;
                    case 'related-keywords':
                        return <RelatedKeywordsPage />;
                    case 'product-keyword':
                        return <ProductKeywordPage />;
                    case 'seo-diagnosis':
                        return <SeoDiagnosisPage />;
                    case 'notification':
                        return <NotificationPage />;
                    case 'reports':
                        return <ReportsPage />;
                    default:
                        return <RankTrackingPage />;
                }
            };

            return (
                <div className="flex h-screen bg-gradient-to-br from-purple-600 via-indigo-600 to-purple-800">
                    {/* 사이드바 */}
                    <div
                        className={`${
                            sidebarOpen ? 'w-64' : 'w-20'
                        } dark-glassmorphism transition-all duration-300 flex flex-col border-r border-purple-500/20`}
                    >
                        <div className="p-4 border-b border-purple-400/20">
                            <div className="flex items-center gap-3">
                                <div className="text-2xl">📊</div>
                                {sidebarOpen && <span className="font-bold text-white">로직 분석 v2</span>}
                            </div>
                        </div>

                        <nav className="flex-1 p-3 space-y-2">
                            {menuItems.map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => navigateTo(item.id)}
                                    className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all ${
                                        currentPage === item.id
                                            ? 'bg-purple-500/40 text-white'
                                            : 'text-gray-300 hover:bg-purple-500/20 hover:text-white'
                                    }`}
                                >
                                    <span className="text-xl flex-shrink-0">{item.icon}</span>
                                    {sidebarOpen && <span className="text-sm font-medium">{item.label}</span>}
                                </button>
                            ))}
                        </nav>

                        <div className="p-3 border-t border-purple-400/20">
                            <div className="p-3 bg-purple-500/20 rounded-lg">
                                <div className="text-xs text-gray-300 font-semibold mb-2">⚙️ 시스템 상태</div>
                                {sidebarOpen && <SystemStatusPage />}
                            </div>
                        </div>

                        <div className="p-3 border-t border-purple-400/20">
                            <button
                                onClick={() => setSidebarOpen(!sidebarOpen)}
                                className="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-lg bg-purple-500/30 text-white hover:bg-purple-500/40 transition-all"
                            >
                                <span className="text-lg">{sidebarOpen ? '◀' : '▶'}</span>
                                {sidebarOpen && <span className="text-xs font-medium">접기</span>}
                            </button>
                        </div>
                    </div>

                    {/* 메인 콘텐츠 */}
                    <div className="flex-1 overflow-auto">
                        <div className="p-6">
                            <div className="max-w-7xl mx-auto">
                                {renderPage()}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // React 렌더링
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

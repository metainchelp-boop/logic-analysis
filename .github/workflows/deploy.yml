name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend/index.html"
          target: "/root/logic-analysis-deploy/"
          overwrite: true

      - name: Deploy backend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend/*"
          target: "/root/logic-analysis-deploy/"
          overwrite: true

      - name: Install dependencies and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/logic-analysis-deploy
            ls -la frontend/index.html backend/

            if [ ! -f docker-compose.yml ]; then
              echo "No docker-compose.yml found, skipping"
              exit 0
            fi

            # мї®нЕМмЭілДИ мЭіл¶Д нЩХмЭЄ
            CONTAINER=$(docker compose ps -q backend 2>/dev/null)

            if [ -n "$CONTAINER" ] && [ -f backend/requirements.txt ]; then
              echo "Installing Python dependencies inside container..."
              docker compose exec -T backend pip install --break-system-packages -r /app/backend/requirements.txt 2>/dev/null || \
              docker compose exec -T backend pip install -r /app/backend/requirements.txt 2>/dev/null || \
              docker compose exec -T backend pip install --break-system-packages -r backend/requirements.txt 2>/dev/null || \
              docker compose exec -T backend pip install -r requirements.txt 2>/dev/null || \
              echo "Warning: pip install inside container failed, trying rebuild..."
            fi

            # мї®нЕМмЭілДИмЧР DockerfileмЭі мЮИмЬЉл©і rebuild, мЧЖмЬЉл©і restart
            if [ -f Dockerfile ] || [ -f backend/Dockerfile ]; then
              echo "Rebuilding and restarting backend..."
              docker compose up -d --build backend
            else
              echo "Restarting backend container..."
              docker compose restart backend
            fi

            # мї®нЕМмЭілДИ мГБнГЬ нЩХмЭЄ
            sleep 3
            docker compose ps backend
            echo "Deployment successful at $(date)"

name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend/"
          target: "/root/logic-analysis-deploy/"
          overwrite: true

      - name: Deploy backend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend/*"
          target: "/root/logic-analysis-deploy/"
          overwrite: true

      - name: Rebuild and restart Docker container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 120s
          script: |
            cd /root/logic-analysis-deploy

            # docker-compose.yml 작성
            cat > docker-compose.yml << 'COMPEOF'
            version: '3.8'
            services:
              logic-analysis:
                build: ./backend
                image: logic-analysis:latest
                container_name: logic-analysis
                restart: unless-stopped
                ports:
                  - "127.0.0.1:5050:5050"
                env_file:
                  - .env
                volumes:
                  - ./data:/app/data
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"
            COMPEOF

            # Nginx에 .jsx MIME 타입 추가 (없으면 추가)
            if ! grep -q '\.jsx' /etc/nginx/mime.types 2>/dev/null; then
              sudo sed -i '/application\/javascript/a\    application/javascript                        jsx;' /etc/nginx/mime.types 2>/dev/null || true
            fi

            # Nginx 설정 리로드 (정적 파일 서빙 반영)
            sudo nginx -t && sudo nginx -s reload 2>/dev/null || true

            # 컨테이너 재빌드 및 재시작
            docker compose down
            docker compose build --no-cache
            docker compose up -d

            # 헬스체크 (최대 30초 대기)
            echo "헬스체크 시작..."
            for i in $(seq 1 10); do
              if curl -sf http://127.0.0.1:5050/api/health > /dev/null 2>&1; then
                echo "헬스체크 성공! (${i}번째 시도)"
                docker compose ps
                exit 0
              fi
              echo "대기 중... (${i}/10)"
              sleep 3
            done

            echo "헬스체크 실패"
            docker compose logs --tail=20
            exit 1
